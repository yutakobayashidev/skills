name: terraform-toolchain-eval
skill: terraform-toolchain
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the skill complete the assigned task?
graders:
  - type: text
    config:
      regex_match:
        - (?i)(ashiba|agent-web-infra|hashi|withPlugins|checkov|trivy|tflint|terraform|opentofu|tofu|nix develop)
  - type: code
    config:
      assertions:
        - len(output) > 0
tasks:
  - tasks/*.yaml
