name: bird-deep-research-eval
skill: bird-deep-research
version: '1.0'
config:
  trials_per_task: 3
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
metrics:
- name: task_completion
  weight: 1.0
  threshold: 0.8
  description: Did the skill route the research request correctly?
graders:
- type: code
  name: nonempty_output
  config:
    assertions:
    - len(output) > 0
tasks:
- tasks/*.yaml
