id: create-web-api-basic-001
name: Basic REST API Contract
description: Test the complete output shape for a small resource-oriented API.
tags:
  - basic
  - happy-path
inputs:
  prompt: "Design a compact, implementable REST API contract for a team bookmarks service. State assumptions and decisions that still need product confirmation. Do not write implementation code."
expected:
  outcomes:
    - type: task_completed
graders:
  # The mock executor only proves fixture/spec plumbing. Real-engine responses
  # must satisfy the contract checks after the mock-prefix guard.
  - name: design_contract_semantics
    type: code
    config:
      assertions:
        - "output.startswith('Mock response for:') or re.search(r'(?i)\\b(GET|POST|PATCH|DELETE)\\s+/[^\\s|`]+', output) is not None"
        - "output.startswith('Mock response for:') or (re.search(r'(?i)\\b(200|201|204|400|401|403|404|409|422)\\b', output) is not None and 'error' in output.lower())"
        - "output.startswith('Mock response for:') or (('pagination' in output.lower() or 'cursor' in output.lower() or 'page_size' in output.lower()) and ('auth' in output.lower() or 'bearer' in output.lower()))"
        - "output.startswith('Mock response for:') or ('example' in output.lower() and ('confirm' in output.lower() or 'assumption' in output.lower() or 'decision' in output.lower()))"
