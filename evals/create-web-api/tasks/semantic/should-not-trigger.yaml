id: create-web-api-negative-001
name: Implementation-only GraphQL Request
description: Avoid replacing an already-fixed GraphQL contract with a REST design.
tags:
  - anti-trigger
  - negative-test
inputs:
  prompt: "Implement a GraphQL resolver in TypeScript for a user profile query. The schema and API contract are already fixed; only write the resolver and tests."
expected:
  output_not_contains:
    - "REST specification"
    - "Endpoint table"
    - "OpenAPI"
  outcomes:
    - type: task_completed
graders:
  - name: preserve_fixed_graphql_contract
    type: code
    config:
      assertions:
        - "'graphql' in output.lower() and 'resolver' in output.lower()"
        - "'typescript' in output.lower() or re.search(r'(?m)^(export |async |const |function |describe\\(|it\\()', output) is not None"
        - "re.search(r'(?i)\\b(GET|POST|PUT|PATCH|DELETE)\\s+/', output) is None"
        - "'endpoint table' not in output.lower() and 'openapi' not in output.lower() and 'rest specification' not in output.lower()"
