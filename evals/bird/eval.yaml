name: bird-eval
skill: Bird
version: '1.0'
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
metrics:
- name: task_completion
  weight: 1.0
  threshold: 0.8
  description: Did the skill complete the assigned task?
graders:
- type: text
  config:
    regex_match:
    - (?i)(bird|twitter|x/twitter|tweet)
- type: code
  config:
    assertions:
    - len(output) > 0
tasks:
- tasks/*.yaml
